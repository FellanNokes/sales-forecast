services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  supabase-db:
    image: postgres:15
    container_name: supabase-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - supabase-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  evidence:
    image: node:20-alpine
    container_name: evidence
    ports:
      - "3000:3000"
    depends_on:
      - supabase-db
    volumes:
      - ./dashboard:/evidence-workspace
    working_dir: /evidence-workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  producer:
    build: ./kafka/weather-forecast/producer
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file:
      - .env

  consumer:
    build: ./kafka/weather-forecast/consumer
    container_name: consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: ${DB_URL}
    env_file:
      - .env

  sales-producer:
    build:
      context: .
      dockerfile: kafka/sales-forecast/producer/Dockerfile
    container_name: sales-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file:
      - .env

  sales-consumer:
    build:
      context: .
      dockerfile: kafka/sales-forecast/consumer/Dockerfile
    container_name: sales-consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: ${DB_URL}
    env_file:
      - .env

  sales-processor:
    build:
      context: .
      dockerfile: kafka/sales-forecast/processor/Dockerfile
    container_name: sales-processor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: ${DB_URL}
    env_file:
      - .env

  prediction-runner:
    build: .
    container_name: prediction-runner
    env_file:
      - .env
    depends_on:
      - consumer
    command: >
      sh -c "echo 'Waiting for weather data to be written to Supabase...' &&
        sleep 120 &&
        while true; do
          uv run -m app.analysis.predict_sales;
          echo 'Next prediction in 24h...';
          sleep 86400;
        done"



volumes:
  supabase-data: